services:
  postgres:
    image: postgres:16-alpine
    container_name: nicotine-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nicotine}
      POSTGRES_USER: ${POSTGRES_USER:-nicotine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nicotine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nicotine} -d ${POSTGRES_DB:-nicotine}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
